<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>물가 상승 생존 게임: 한 달 예산 지키기</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="top-bar">
    <div class="brand">
      <p class="eyebrow">중3 사회② 경제 단원</p>
      <h1>물가 상승 생존 게임</h1>
    </div>
    <div class="status-board" aria-live="polite">
      <div>
        <span>현재 라운드</span>
        <strong id="headerRound">시작 전</strong>
      </div>
      <div>
        <span>경제 상황</span>
        <strong id="headerSituation">수업 준비</strong>
      </div>
    </div>
    <nav class="header-actions">
      <button type="button" class="ghost-button" id="homeBtn">처음으로</button>
      <button type="button" class="danger-button" id="resetBtn">전체 초기화</button>
    </nav>
  </header>

  <main id="app" class="app-shell"></main>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
